<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lossless Compression Diagnostics Pipeline</title>
  <!-- Google Fonts: Inter and JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Ultra-Minimalist CSS System */
    :root {
      --bg-color: #f8fafc; /* Cool elegant slate-50 light mode */
      --card-color: #ffffff;
      --text-primary: #0f172a; /* Slate 900 */
      --text-muted: #64748b; /* Slate 500 */
      --border-color: #e2e8f0; /* Slate 200 */
      --accent-color: #0f172a;
      
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-sans);
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* Zero scrolling SPA constraint */
    }

    /* Core Card Layout */
    .app-card {
      width: 100%;
      max-width: 580px;
      padding: 2.5rem;
      background: var(--card-color);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.02);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
      opacity: 1;
      transform: translateY(0);
    }

    .app-card.fade {
      opacity: 0;
      transform: translateY(4px);
    }

    /* Dot Progress Indicators */
    .progress-dots {
      display: flex;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--border-color);
      transition: all 0.3s ease;
    }

    .dot.active {
      background-color: var(--accent-color);
      transform: scale(1.2);
    }

    .dot.completed {
      background-color: #10b981; /* Soft green */
    }

    /* Typography & Context */
    .context-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      transition: color 0.2s ease;
    }

    /* Synthesis Accent Classes */
    .context-title.text-success {
      color: #10b981; /* Success Checkpoint Accent */
    }

    .context-title.text-danger {
      color: #ef4444; /* Trap Limit Warning Accent */
    }

    .context-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 2rem;
      max-width: 480px;
    }

    /* Flat Visual Binary Grid (RLE Mode) */
    .binary-grid-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .binary-grid {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pixel-block {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    /* 1 = Black, 0 = White with border */
    .pixel-block.one {
      background-color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }

    .pixel-block.zero {
      background-color: #ffffff;
      border: 1px solid var(--border-color);
    }

    /* Huffman & LZ Display Layout */
    .huffman-display-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .huffman-dict {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-primary);
      background: #f1f5f9; /* Slate 100 */
      padding: 0.6rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border-color);
      display: inline-block;
      letter-spacing: 0.5px;
    }

    .huffman-target-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .huffman-target-text {
      font-family: var(--font-mono);
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      text-transform: uppercase;
    }

    /* Sleek Input Fields */
    .input-wrapper {
      width: 100%;
      max-width: 320px;
      position: relative;
      margin-bottom: 2rem;
    }

    .text-input {
      width: 100%;
      padding: 0.75rem 0.5rem;
      font-family: var(--font-mono);
      font-size: 1.25rem;
      color: var(--text-primary);
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--border-color);
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      transition: border-color 0.2s ease;
    }

    .text-input:focus {
      border-color: var(--accent-color);
    }

    .text-input::placeholder {
      color: var(--border-color);
      letter-spacing: 0;
    }

    /* Side-by-side Telemetry Numbers */
    .telemetry-row {
      display: flex;
      justify-content: center;
      gap: 3rem;
      width: 100%;
      border-top: 1px solid #f1f5f9;
      padding-top: 1.5rem;
    }

    .telemetry-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .telemetry-value {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .telemetry-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      transition: all 0.2s ease;
    }

    /* Flat Action Button for Synthesis States */
    .flat-btn {
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      background-color: var(--accent-color);
      color: #ffffff;
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 6px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.2s ease;
      margin-bottom: 2rem;
    }

    .flat-btn:hover {
      opacity: 0.9;
    }

    /* Utility transition class */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="app-card" id="app-card">
    <!-- Subtle Progress Dot Indicators (Expanded to 10 dots for complete RLE + Huffman + LZ pipeline) -->
    <div class="progress-dots" id="dotsContainer">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <!-- Title and Narrative Context -->
    <div class="context-title" id="contextTitle">TUTORIAL</div>
    <div class="context-text" id="contextText">
      Loading...
    </div>

    <!-- Visual Datastream Grid (RLE Mode ONLY) -->
    <div class="binary-grid-wrapper" id="gridWrapper">
      <div class="binary-grid" id="binaryGrid"></div>
    </div>

    <!-- Huffman & LZ Display Container (Huffman & LZ Mode ONLY) -->
    <div id="huffmanContainer" class="hidden huffman-display-wrapper">
      <div id="huffmanDictionary" class="huffman-dict"></div>
      <div class="huffman-target-label">Target String</div>
      <div id="huffmanTarget" class="huffman-target-text"></div>
    </div>

    <!-- User Input (For Interactive States) -->
    <div class="input-wrapper" id="inputContainer">
      <input 
        type="text" 
        class="text-input" 
        id="rleInput" 
        placeholder="oXzY" 
        autocomplete="off" 
        spellcheck="false"
      />
    </div>

    <!-- Theory Continued Button (For Synthesis States) -->
    <button class="flat-btn hidden" id="btn-continue">Next Node</button>

    <!-- Live Telemetry (Dynamic labels and calculations) -->
    <div class="telemetry-row" id="telemetryContainer">
      <div class="telemetry-item">
        <span class="telemetry-value" id="rawSizeVal">0</span>
        <span class="telemetry-label" id="rawLabel">Raw Size (bits)</span>
      </div>
      <div class="telemetry-item">
        <span class="telemetry-value" id="compressedSizeVal">0</span>
        <span class="telemetry-label" id="compressedLabel">Compressed Size (chars)</span>
      </div>
    </div>
  </div>

  <script>
    // Unified 20-state data structure containing RLE, Huffman, and LZ pipelines
    const states = [
      // RLE States (0 - 7)
      {
        id: 0,
        mode: "rle",
        isInteractive: true,
        title: "TUTORIAL: LOSSLESS COMPRESSION",
        text: "Data Compression reduces data size to save storage and transmission time. We will build 'Run-Length Encoding' (RLE), the simplest lossless method. It replaces consecutive repeating symbols with the symbol and its count. 'o' represents 1 (Black), 'z' represents 0 (White). Compress 1100:",
        binary: "1100",
        expected: "o2z2"
      },
      {
        id: 1,
        mode: "rle",
        isInteractive: false,
        title: "PIPELINE VERIFIED",
        text: "Correct! You just performed Lossless Compression. By transmitting 'o2z2' instead of '1100', the receiver can perfectly deconstruct the string to get the exact original message. No data was lost. Let's look at how hardware uses this.",
        binary: "1100",
        expected: null
      },
      {
        id: 2,
        mode: "rle",
        isInteractive: true,
        title: "NODE 1: THE PRINTER",
        text: "A printer scans pages line by line. Most of a document is blank white space (0s) with occasional black text (1s). Compress this blank scanline containing a single black text block:",
        binary: "000011110000",
        expected: "z4o4z4"
      },
      {
        id: 3,
        mode: "rle",
        isInteractive: false,
        title: "BANDWIDTH OPTIMIZED",
        text: "Excellent. You reduced 12 raw bits down to 6 characters. Because the compressed bits take up less space, the printer's memory buffer doesn't overflow, and the data transmits much faster from the computer. RLE is highly efficient for binary data.",
        binary: "000011110000",
        expected: null
      },
      {
        id: 4,
        mode: "rle",
        isInteractive: true,
        title: "NODE 2: THE FAX MACHINE",
        text: "Fax machines use RLE to transmit images over old telephone lines. It simply groups the runs of white background and black ink. Compress this handwritten signature curve:",
        binary: "00110001111",
        expected: "z2o2z3o4"
      },
      {
        id: 5,
        mode: "rle",
        isInteractive: false,
        title: "EFFICIENCY WARNING",
        text: "Spot on. The fax machine only sends the summary of the changes ('2 white, 2 black...') over the line. But notice your compressed size (8) is getting very close to the raw size (11). What happens when data has no patterns?",
        binary: "00110001111",
        expected: null
      },
      {
        id: 6,
        mode: "rle",
        isInteractive: true,
        title: "NODE 3: THE TRAP",
        text: "Compress this encrypted data packet. Modern encryption scrambles data so it looks like perfectly random noise to secure it against attackers:",
        binary: "10101010",
        expected: "o1z1o1z1o1z1o1z1"
      },
      {
        id: 7,
        mode: "rle",
        isInteractive: false,
        title: "SYSTEM LIMIT REACHED",
        text: "Notice how the compressed size (16) is double the raw size (8)? RLE relies entirely on spatial redundancy (long repeating runs). Encrypted or highly variable data has no runs. You have discovered the algorithm's limits: compression algorithms must be carefully matched to the data type.",
        binary: "10101010",
        expected: null
      },
      // Huffman Coding States (8 - 13)
      {
        id: 8,
        mode: "huffman",
        isInteractive: true,
        title: "TUTORIAL: FREQUENCY MATTERS",
        text: "RLE fails when there are no repeating runs. Huffman Coding solves this by using 'Variable-Length Codes'. It assigns shorter codes to common characters and longer codes to rare ones. If 'E' is the most common letter in English and 'Z' is the rarest, which binary code should 'E' get to save the most space? Type '0' or '1110'.",
        dictionary: null,
        targetString: null,
        expected: "0"
      },
      {
        id: 9,
        mode: "huffman",
        isInteractive: false,
        title: "VARIABLE-LENGTH EFFICIENCY",
        text: "Correct! By giving the most frequent symbol the shortest code (just 1 bit), we drastically reduce the total file size. To make this work, the system builds a 'Huffman Tree' mapping out the exact frequency of every character in the data.",
        dictionary: null,
        targetString: null,
        expected: null
      },
      {
        id: 10,
        mode: "huffman",
        isInteractive: true,
        title: "NODE 4: THE DICTIONARY",
        text: "Here is a generated Huffman dictionary for the word 'BEEKEEPER'. Notice how 'E' gets the shortest code because it appears most frequently. Use this dictionary to compress the target string.",
        dictionary: "[E=0], [B=10], [K=110], [P=111], [R=1100]",
        targetString: "BEE",
        expected: "1000"
      },
      {
        id: 11,
        mode: "huffman",
        isInteractive: false,
        title: "THE PREFIX RULE",
        text: "Excellent. 'BEE' compressed from 24 bits (standard ASCII) down to just 4 bits (1000)! But how does the computer know when one letter stops and another starts? Huffman codes follow the 'Prefix Rule': no code is a prefix of another.",
        dictionary: "[E=0], [B=10], [K=110], [P=111], [R=1100]",
        targetString: "BEE",
        expected: null
      },
      {
        id: 12,
        mode: "huffman",
        isInteractive: true,
        title: "NODE 5: DECODING",
        text: "Because of the Prefix Rule, decoding is unambiguous. The system reads left to right until it matches a complete dictionary code. Decrypt this intercepted binary stream:",
        dictionary: "[E=0], [B=10], [K=110], [P=111], [R=1100]",
        targetString: "11100",
        expected: "pee"
      },
      {
        id: 13,
        mode: "huffman",
        isInteractive: false,
        title: "PIPELINE SECURED",
        text: "Perfect. The system reads '111', sees it matches 'P', and knows it can't be part of a longer code. Huffman coding is universally used in ZIP files and as the final optimization step in JPEG and MP3 compression. You have mastered Frequency-based Compression!",
        dictionary: null,
        targetString: null,
        expected: null
      },
      // Lempel-Ziv Coding States (14 - 19)
      {
        id: 14,
        mode: "lz",
        isInteractive: true,
        title: "TUTORIAL: DYNAMIC DICTIONARIES",
        text: "Huffman coding requires sending the frequency dictionary along with the data. Lempel-Ziv (LZ) is smarter: it builds a dictionary *on the fly* as it reads. It looks for repeated phrases. In the string 'CANCAN', what is the longest repeating phrase?",
        dictionary: null,
        targetString: "CANCAN",
        expected: "can"
      },
      {
        id: 15,
        mode: "lz",
        isInteractive: false,
        title: "LEARNING AS IT GOES",
        text: "Correct! LZ scans the data and saves 'CAN' to a numbered dictionary. When it sees 'CAN' again later in the file, it doesn't write the letters. It just outputs the dictionary index.",
        dictionary: null,
        targetString: "CANCAN",
        expected: null
      },
      {
        id: 16,
        mode: "lz",
        isInteractive: true,
        title: "NODE 5: THE INDEX POINTER",
        text: "Let's compress 'WEEWEEWEE'. The system reads the first part and builds this dictionary: [1=W], [2=E], [3=WEE]. To output the next 'WEE', type its dictionary index:",
        dictionary: "[1=W], [2=E], [3=WEE]",
        targetString: "WEE",
        expected: "3"
      },
      {
        id: 17,
        mode: "lz",
        isInteractive: false,
        title: "THE POWER OF LZ",
        text: "Exactly. Instead of writing 'WEE' again, the system just outputs '3'. The magic of LZ is that the decoder reads the data and rebuilds the *exact same dictionary* simultaneously. You don't have to send the dictionary in advance!",
        dictionary: "[1=W], [2=E], [3=WEE]",
        targetString: "WEE",
        expected: null
      },
      {
        id: 18,
        mode: "lz",
        isInteractive: true,
        title: "NODE 6: DECODING ON THE FLY",
        text: "Let's act as the decoder. You have rebuilt this dictionary: [1=A], [2=B], [3=AB]. Decode this incoming stream of LZ tokens: 1, 2, 3, 3",
        dictionary: "[1=A], [2=B], [3=AB]",
        targetString: "1, 2, 3, 3",
        expected: "abababab"
      },
      {
        id: 19,
        mode: "lz",
        isInteractive: false,
        title: "PIPELINE SECURED: COMPRESSION MASTERED",
        text: "Perfect! 1(A) + 2(B) + 3(AB) + 3(AB) = ABABABAB. You just executed Lempel-Ziv compression. This dynamic dictionary algorithm is the engine behind ZIP files, GIFs, and PNGs. You have successfully cleared the Data Compression pipeline!",
        dictionary: null,
        targetString: null,
        expected: null
      }
    ];

    let currentStateIndex = 0;

    // DOM Elements
    const card = document.getElementById('app-card');
    const dotsContainer = document.getElementById('dotsContainer');
    const contextTitle = document.getElementById('contextTitle');
    const contextText = document.getElementById('contextText');
    
    // Mode-specific container elements
    const gridWrapper = document.getElementById('gridWrapper');
    const binaryGrid = document.getElementById('binaryGrid');
    const huffmanContainer = document.getElementById('huffmanContainer');
    const huffmanDictionary = document.getElementById('huffmanDictionary');
    const huffmanTarget = document.getElementById('huffmanTarget');

    // Controls
    const inputContainer = document.getElementById('inputContainer');
    const rleInput = document.getElementById('rleInput');
    const btnContinue = document.getElementById('btn-continue');
    
    // Telemetry displays
    const telemetryContainer = document.getElementById('telemetryContainer');
    const rawSizeVal = document.getElementById('rawSizeVal');
    const compressedSizeVal = document.getElementById('compressedSizeVal');
    const rawLabel = document.getElementById('rawLabel');
    const compressedLabel = document.getElementById('compressedLabel');

    // Render active state elements
    function renderState() {
      const state = states[currentStateIndex];

      // 1. Progress Dots active indicators mapping (Groups 20 states into 10 dot indices)
      const dots = dotsContainer.querySelectorAll('.dot');
      const activeDotIndex = Math.floor(currentStateIndex / 2);
      
      dots.forEach((dot, idx) => {
        dot.className = "dot";
        if (idx < activeDotIndex) {
          dot.classList.add('completed');
        } else if (idx === activeDotIndex) {
          dot.classList.add('active');
        }
      });

      // 2. Set context narratives
      contextTitle.textContent = state.title;
      contextText.textContent = state.text;

      // 3. Switch layout based on pipeline mode ('rle' vs 'huffman'/'lz')
      if (state.mode === 'rle') {
        // RLE Mode displays
        gridWrapper.classList.remove('hidden');
        huffmanContainer.classList.add('hidden');

        // Swap Telemetry Headers
        rawLabel.textContent = "Raw Size (bits)";
        compressedLabel.textContent = "Compressed Size (chars)";

        // Draw visual pixels
        binaryGrid.innerHTML = "";
        state.binary.split("").forEach(char => {
          const block = document.createElement("div");
          block.className = `pixel-block ${char === '1' ? 'one' : 'zero'}`;
          binaryGrid.appendChild(block);
        });

        // Set Raw Bit Count
        rawSizeVal.textContent = state.binary.length;
      } else {
        // Huffman & LZ Mode displays (both use the same dictionary and target blocks)
        gridWrapper.classList.add('hidden');
        huffmanContainer.classList.remove('hidden');

        // Swap Telemetry Headers dynamically depending on active mode
        if (state.mode === 'lz') {
          rawLabel.textContent = "Raw Text (chars)";
          compressedLabel.textContent = "LZ Output (tokens)";
        } else {
          rawLabel.textContent = "Standard ASCII (bits)";
          compressedLabel.textContent = "Huffman Payload (bits)";
        }

        // Render Dictionary block
        if (state.dictionary) {
          huffmanDictionary.textContent = state.dictionary;
          huffmanDictionary.classList.remove('hidden');
        } else {
          huffmanDictionary.classList.add('hidden');
        }

        // Render Target String block
        if (state.targetString) {
          huffmanTarget.textContent = state.targetString;
          huffmanTarget.classList.remove('hidden');
          document.querySelector('.huffman-target-label').classList.remove('hidden');
        } else {
          huffmanTarget.classList.add('hidden');
          document.querySelector('.huffman-target-label').classList.add('hidden');
        }

        // Calculate Raw Telemetry counts
        if (state.mode === 'lz') {
          rawSizeVal.textContent = state.targetString ? state.targetString.length : "0";
        } else {
          // Huffman mode Standard ASCII size
          if (state.targetString) {
            rawSizeVal.textContent = state.targetString.length * 8;
          } else {
            rawSizeVal.textContent = "8"; // Default single letter 'E' standard size
          }
        }
      }

      // 4. Interactive input fields vs synthesis checkpoint controls
      if (state.isInteractive) {
        inputContainer.classList.remove('hidden');
        btnContinue.classList.add('hidden');

        // Clear highlight success color classes
        contextTitle.classList.remove('text-success', 'text-danger');

        // Reset inputs
        rleInput.value = "";
        compressedSizeVal.textContent = "0";

        // Set dynamic placeholder to match state mode
        if (state.mode === 'rle') {
          rleInput.placeholder = "oXzY";
        } else if (state.mode === 'lz') {
          rleInput.placeholder = "Decompressed text / Token";
        } else {
          rleInput.placeholder = "Code payload";
        }

        // Auto-focus input
        setTimeout(() => rleInput.focus(), 50);
      } else {
        inputContainer.classList.add('hidden');
        btnContinue.classList.remove('hidden');

        // Apply highlights based on checkpoint context
        if (currentStateIndex === 7) {
          contextTitle.classList.remove('text-success');
          contextTitle.classList.add('text-danger');
          btnContinue.textContent = "Next Node";
        } else if (currentStateIndex === 19) {
          // Final node celebration
          contextTitle.classList.remove('text-danger');
          contextTitle.classList.add('text-success');
          btnContinue.textContent = "Return to Command Dashboard";
        } else {
          contextTitle.classList.remove('text-danger');
          contextTitle.classList.add('text-success');
          btnContinue.textContent = "Next Node";
        }

        // Keep dynamic telemetry carried over
        const previousInteractiveState = states[currentStateIndex - 1];
        
        // Calculate carried over raw/compressed values
        if (state.mode === 'lz') {
          rawSizeVal.textContent = previousInteractiveState.targetString ? previousInteractiveState.targetString.length : "0";
          compressedSizeVal.textContent = previousInteractiveState.expected.length;
        } else if (state.mode === 'huffman') {
          if (previousInteractiveState.targetString) {
            rawSizeVal.textContent = previousInteractiveState.targetString.length * 8;
          } else {
            rawSizeVal.textContent = "8";
          }
          compressedSizeVal.textContent = previousInteractiveState.expected.length;
        } else {
          rawSizeVal.textContent = previousInteractiveState.binary.length;
          compressedSizeVal.textContent = previousInteractiveState.expected.length;
        }
      }
    }

    // Transition with a clean CSS opacity fade
    function transitionToState(nextStateIndex) {
      card.classList.add('fade');
      setTimeout(() => {
        currentStateIndex = nextStateIndex;
        renderState();
        card.classList.remove('fade');
      }, 200);
    }

    // Key event listener for real-time validation
    rleInput.addEventListener('input', (e) => {
      const activeState = states[currentStateIndex];
      let val = e.target.value;

      // Clean characters based on mode to maintain focus flow
      if (activeState.mode === 'rle') {
        val = val.replace(/[^o-z0-9]/gi, "").toLowerCase();
      } else if (activeState.mode === 'lz') {
        // Strip whitespace and force lowercase for LZ comparisons
        val = val.toLowerCase().replace(/\s+/g, "");
      } else {
        // Huffman mode: allow letters, numbers, and brackets/symbols
        val = val.toLowerCase();
      }
      e.target.value = val;

      // Telemetry payload count
      compressedSizeVal.textContent = val.length;

      // Real-time matching triggers transition instantly on success
      if (val === activeState.expected) {
        rleInput.blur();
        transitionToState(currentStateIndex + 1);
      }
    });

    // Continue action triggers next node or restarts pipeline at the end
    btnContinue.addEventListener('click', () => {
      if (currentStateIndex === states.length - 1) {
        // Last state synthesis: restart game back to state 0
        transitionToState(0);
      } else {
        // Continue to next node
        transitionToState(currentStateIndex + 1);
      }
    });

    // Boot
    window.addEventListener('load', () => {
      renderState();
    });
  </script>
</body>
</html>
